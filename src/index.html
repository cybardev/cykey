<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Cy | key</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="https://unpkg.com/tone"></script>
    <script defer src="script.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    x-data="STATE"
    @keydown.window="keyPress"
    @keyup.window="keyRelease"
    @touchend.prevent="stopReleasedNotes"
    @touchcancel.prevent="stopReleasedNotes"
  >
    <header>
      <h1>Cy&nbsp;<span class="crimson">|</span>&nbsp;key</h1>
    </header>
    <main>
      <section id="keypad">
        <template x-for="(note, index) in notes" :key="index">
          <button
            type="button"
            class="note"
            :class="{ active: pressed.includes(note) }"
            @mousedown="playNote"
            @mouseup="stopNote"
            @mouseleave="stopNote"
            @touchstart.prevent="playNote"
            x-text="note"
            x-cloak
          ></button>
        </template>
      </section>
    </main>
    <footer id="selections">
      <fieldset id="octave-selection" :class="{ pill: pillShape }">
        <legend @click="pillShape = !pillShape">Octave</legend>
        <template x-for="o in octaveRange" :key="o">
          <label>
            <input
              type="radio"
              name="octave"
              :value="o"
              :checked="o === baseOctave"
              @change="baseOctave = parseInt($event.target.value)"
            />
            <span x-text="o"></span>
          </label>
        </template>
      </fieldset>
    </footer>
  </body>
</html>
